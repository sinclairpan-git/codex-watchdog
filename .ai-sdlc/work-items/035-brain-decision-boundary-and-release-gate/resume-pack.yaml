  context_summary: |
    # Development Summary

    - `WI-035` 当前仍在执行 `T354`：当前主线已经从“把这组治理规则下沉到 generated release_gate_report + fixture contract”推进到“把 report-level governance contract 接到 runtime load path，拒绝 drifted hand-authored report”。
    - resident runtime 默认放行路径已经正式消费 `release_gate_report` artifact，不再一律回退到 `report:resident_default`。
    - runtime gate 降级已进入现有 ops/read-side surface，并且 alert 已经按稳定 taxonomy 分桶，而不是直接暴露原始 reason。
    - shared runtime contract 也已经有显式的 `Settings.build_runtime_contract(...)` surface。
    - 最新切片继续把 report-level governance contract 接到 runtime load path：
      - `parse_release_gate_report(...)` 现在会先做 `ReleaseGateReport.model_validate(...)`，再强制校验 `runtime_contract_surface_ref` 与 `runtime_gate_reason_taxonomy` 必须等于 canonical default；
      - resident orchestrator 已改成通过这条 helper 加载 report，因此治理 metadata 一旦漂移，就会沿既有 `report_load_failed` 路径 fail-closed；
      - 结果是 hand-authored drifted report 不再能因为“字段齐了”就悄悄绕过 release gate。
    - 对抗 review 又补出两条更细的 fail-closed 漏洞，现已收口：
      - `parse_release_gate_report(...)` 现在是先比较原始 payload 的 governance JSON contract，再交给 Pydantic 做 shape 校验，因此缺失默认字段、依赖类型宽松或默认补全的 drifted report 也会被拒绝；
      - `parse_release_gate_report(...)` 现在也会先验证 payload 必须是 JSON object，因此 `[]`、`null`、字符串这类合法但非对象的 report 文件，也会稳定走 `report_load_failed`。
    - 对抗 review 最后又补出 Python 宽松相等语义的漏洞，现也已收口：
      - raw taxonomy 比较现在改成 canonical JSON 精确相等，而不是 Python dict equality；
      - 所以 `1` 冒充 `true` 这类 Python 看起来“相等”、但 JSON contract 实际漂移的 payload，也会被拒绝。
    - 当前已完成验证：
      - `uv run pytest -q tests/test_watchdog_release_gate.py -k 'defaulted_governance_metadata or non_object_payload or python_equal_but_json_drifted_taxonomy or parse_release_gate_report_rejects_governance_contract_drift'` -> `4 passed, 8 deselected in 0.14s`
      - `uv run pytest -q tests/test_watchdog_release_gate.py tests/test_watchdog_session_spine_runtime.py -k 'non_object_payload or not_json_object or defaulted_governance_metadata or governance_drifts'` -> `4 passed, 44 deselected in 0.58s`
      - `uv run pytest -q tests/test_watchdog_release_gate.py tests/test_watchdog_session_spine_runtime.py -k 'parse_release_gate_report_rejects_governance_contract_drift or governance_drifts'` -> `2 passed, 43 deselected in 0.51s`
      - `uv run pytest -q tests/test_watchdog_release_gate.py tests/test_watchdog_release_gate_evidence.py tests/test_watchdog_ops.py tests/test_watchdog_policy_engine.py tests/test_watchdog_session_spine_runtime.py tests/test_long_running_autonomy_doc_contracts.py` -> `76 passed in 4.96s`
    - 下一步优先评估两件事：
      - 是否把这条 parse/validate contract 再上提到 evidence bundle 或 shared loading API，而不是只停在 release_gate helper；
      - 是否让 release-gate/provider/replay 侧的后续流程文档明确引用 runtime load-time governance contract，而不是只在单一 runbook 中定义。
