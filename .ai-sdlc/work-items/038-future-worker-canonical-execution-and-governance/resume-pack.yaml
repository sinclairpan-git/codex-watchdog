      - 首轮红测暴露的模块缺失、`Session Service` event 缺失、app wiring 缺失均已补齐。
    - `T383` 正在进行：
      - `src/watchdog/services/future_worker/` 已落地 models/service，request/start/heartbeat/summary/completed/failed/cancelled/consume/reject 都能写回 canonical truth；
