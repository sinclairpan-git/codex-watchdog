name: PR Gate
permissions:
  contents: read
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  verify-constraints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev
      - run: uv run python -m ai_sdlc verify constraints
  test:
    needs: verify-constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev
      - run: uv run pytest -q
  lint:
    needs: verify-constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev
      - run: uv run ruff check
